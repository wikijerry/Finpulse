<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — FinPulse</title>
  <meta name="description" content="Read the full article on FinPulse." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="nav" id="main-nav">
    <span class="nav__brand">FP—FINPULSE 01</span>
    <ul class="nav__links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#articles">Finance</a></li>
      <li><a href="index.html#articles">News</a></li>
      <li><a href="admin-login.html">Admin</a></li>
    </ul>
    <span class="nav__status">LIVE MARKET DATA</span>
    <button class="nav__hamburger" id="nav-hamburger" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Article Content -->
  <article class="article-page" id="article-page">
    <!-- Populated by JS -->
  </article>

  <!-- Footer -->
  <footer class="footer">
    <span class="footer__copy">© 2026 FinPulse. All Rights Reserved.</span>
    <div class="footer__links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </footer>

  <!-- Rotating Badge -->
  <div class="rotating-badge">
    <svg viewBox="0 0 64 64">
      <defs>
        <path id="badge-path" d="M 32,32 m -24,0 a 24,24 0 1,1 48,0 a 24,24 0 1,1 -48,0" fill="none" />
      </defs>
      <circle cx="32" cy="32" r="30" />
      <text>
        <textPath href="#badge-path">FINPULSE • DAILY BRIEFING • FINPULSE • DAILY BRIEFING •</textPath>
      </text>
    </svg>
  </div>

  <script src="data.js"></script>
  <script>
    (function () {
      'use strict';

      document.addEventListener('DOMContentLoaded', () => {
        const params = new URLSearchParams(window.location.search);
        const articleId = parseInt(params.get('id'));

        // Load articles
        const stored = JSON.parse(localStorage.getItem('blog_articles') || '[]');
        const articles = stored.length > 0 ? stored : SAMPLE_ARTICLES;
        const article = articles.find(a => a.id === articleId);

        const container = document.getElementById('article-page');

        if (!article) {
          container.innerHTML = `
            <a href="index.html" class="article-page__back">← Back to Home</a>
            <h1 class="article-page__title">Article Not Found</h1>
            <p style="color: var(--text-secondary); margin-top: 1rem;">The article you're looking for doesn't exist or may have been removed.</p>
          `;
          return;
        }

        // Update page title
        document.title = `${article.title} — FinPulse`;
        document.querySelector('meta[name="description"]').setAttribute('content', article.excerpt);

        container.innerHTML = `
          <a href="index.html" class="article-page__back">← Back to Home</a>
          <span class="article-page__category">${article.category}</span>
          <h1 class="article-page__title">${article.title}</h1>
          <div class="article-page__meta">
            <span>${article.author}</span>
            <span class="article-card__meta-divider"></span>
            <span>${formatDate(article.date)}</span>
            <span class="article-card__meta-divider"></span>
            <span>${article.readTime} read</span>
          </div>
          <div class="article-page__body">
            ${article.body}
          </div>
          <div class="article-page__share">
            <span class="article-page__share-label">Share</span>
            <button class="share-btn" onclick="shareArticle('twitter')" title="Share on Twitter">𝕏</button>
            <button class="share-btn" onclick="shareArticle('linkedin')" title="Share on LinkedIn">in</button>
            <button class="share-btn" onclick="shareArticle('copy')" title="Copy link">⎘</button>
          </div>
        `;

        // Mobile nav
        const hamburger = document.getElementById('nav-hamburger');
        const links = document.getElementById('nav-links');
        if (hamburger && links) {
          hamburger.addEventListener('click', () => {
            links.classList.toggle('mobile-open');
          });
        }
      });

      function formatDate(dateStr) {
        const d = new Date(dateStr);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      }

      window.shareArticle = function (platform) {
        const url = window.location.href;
        const title = document.title;

        switch (platform) {
          case 'twitter':
            window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`, '_blank');
            break;
          case 'linkedin':
            window.open(`https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(url)}`, '_blank');
            break;
          case 'copy':
            navigator.clipboard.writeText(url).then(() => {
              if (window.showToast) {
                window.showToast('Link copied to clipboard');
              } else {
                alert('Link copied!');
              }
            });
            break;
        }
      };
    })();
  </script>
</body>
</html>
